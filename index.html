<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UtilityBills">
<meta name="theme-color" content="#161b22">
<meta name="description" content="Utility Bills Manager - Track water and electricity bills">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>⚡ UtilityBills</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
input,button,select{font-family:inherit}
/* TOP BAR */
#topbar{background:#161b22;border-bottom:1px solid #21262d;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
#topbar h1{font-size:1rem;font-weight:700}
#topbar h1 b{color:#58a6ff}
#savedTxt{font-size:.7rem;color:#3fb950;opacity:0;transition:.3s}
#savedTxt.on{opacity:1}
input[type=month]{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:5px 9px;color:#e6edf3;font-size:.78rem;font-family:inherit;color-scheme:dark;outline:none}
/* TABS */
#tabs{background:#161b22;border-bottom:1px solid #21262d;display:flex}
.tab{flex:1;border:none;background:none;color:#8b949e;font-family:inherit;font-size:.76rem;font-weight:500;padding:10px 4px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
.tab.on{color:#58a6ff;font-weight:700;border-bottom-color:#58a6ff}
.tab span{display:block;font-size:1rem;margin-bottom:2px}
/* PAGES */
#content{padding:16px 14px 100px;max-width:860px;margin:0 auto}
.pg{display:none}.pg.on{display:block}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:8px 14px;border:none;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:.15s;outline:none;white-space:nowrap}
.btn:active{opacity:.7;transform:scale(.97)}
.b-blue{background:#1f6feb;color:#fff}
.b-green{background:#238636;color:#fff}
.b-orange{background:#d29922;color:#fff}
.b-red{background:rgba(248,81,73,.12);color:#f85149;border:1px solid rgba(248,81,73,.2)}
.b-ghost{background:transparent;color:#8b949e;border:1px solid #30363d}
.b-sm{font-size:.7rem;padding:5px 10px}
.abar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
/* BUILDING CARD */
.bcard{background:#161b22;border:1px solid #21262d;border-radius:10px;margin-bottom:12px;overflow:hidden}
.bhdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#0d1117;cursor:pointer;user-select:none}
.bhdr:active{background:#0a0f1a}
.bleft{display:flex;align-items:center;gap:9px}
.bnum{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700}
.bname{font-weight:700;font-size:.9rem}
.bmeta{font-size:.65rem;color:#8b949e;margin-top:1px}
.btotal{font-weight:700;color:#3fb950;font-size:.9rem}
.chev{color:#484f58;transition:.2s;font-size:.7rem;margin-left:4px}
.closed .chev{transform:rotate(-90deg)}
.closed .cbody{display:none}
.cbody{padding:12px}
/* ROOM */
.rcard{border:1px solid #30363d;border-radius:8px;margin-bottom:9px;overflow:hidden}
.rhdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#161b22;flex-wrap:wrap;gap:7px}
.rname{font-weight:700;font-size:.86rem}
.tinp{background:transparent;border:none;border-bottom:1px dashed #30363d;color:#8b949e;font-size:.72rem;padding:1px 3px;outline:none;width:130px;margin-top:3px;display:block}
.tinp:focus{border-bottom-color:#58a6ff;color:#e6edf3}
.tinp::placeholder{color:#484f58}
.rtotal{font-weight:700;color:#58a6ff;font-size:.86rem}
.rbtns{display:flex;align-items:center;gap:6px}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:.74rem}
.tbl th{background:rgba(255,255,255,.03);color:#8b949e;padding:6px 8px;text-align:center;font-size:.6rem;text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.tbl th:first-child{text-align:left;padding-left:12px;width:90px}
.tbl td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;vertical-align:middle}
.tbl td:first-child{text-align:left;padding-left:12px}
.ninp{width:74px;background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:4px 6px;color:#e6edf3;font-size:.74rem;text-align:center;outline:none}
.ninp:focus{border-color:#58a6ff}
.dv{font-weight:700;color:#3fb950}
.bv{font-weight:700;color:#58a6ff}
.zv{color:#484f58}
.ev{color:#f85149;font-size:.68rem}
.trow td{background:rgba(88,166,255,.06)!important;font-weight:700;border-top:1px solid rgba(88,166,255,.15)!important}
/* ADD METER */
.amrow{display:flex;gap:5px;padding:8px 12px;background:rgba(255,255,255,.02);border-top:1px dashed #21262d;flex-wrap:wrap;align-items:center}
.amrow label{font-size:.66rem;color:#484f58;font-weight:600}
.sminp{background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:5px 7px;color:#e6edf3;font-size:.72rem;outline:none}
.sminp:focus{border-color:#58a6ff}
.in-n{width:82px}.in-u{width:68px}.in-r{width:56px}
/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:16px}
.ov.on{display:flex!important}
.mbox{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:22px;width:100%;max-width:380px;animation:pop .18s ease}
@keyframes pop{from{transform:scale(.93);opacity:0}to{transform:none;opacity:1}}
.mbox h3{font-size:1rem;font-weight:700;margin-bottom:16px}
.frow{margin-bottom:12px}
.frow label{display:block;font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#8b949e;margin-bottom:5px}
.finp{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 12px;color:#e6edf3;font-size:.88rem;outline:none}
.finp:focus{border-color:#58a6ff}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px}
.sc{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:13px}
.si{font-size:1.3rem;margin-bottom:7px}
.sv{font-size:1.3rem;font-weight:700;line-height:1}
.sl{font-size:.68rem;color:#8b949e;margin-top:3px}
/* CHARTS */
.cc{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:13px;margin-bottom:11px}
.ct{font-size:.82rem;font-weight:700;margin-bottom:11px}
.barwrap{display:flex;align-items:flex-end;gap:5px;height:90px;padding-bottom:16px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:3px}
.barval{font-size:.55rem;color:#8b949e;white-space:nowrap}
.barlbl{font-size:.57rem;color:#484f58;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
/* TENANTS */
.cbar{display:flex;gap:9px;margin-bottom:13px}
.cbox{flex:1;border-radius:9px;padding:10px 13px;display:flex;align-items:center;gap:9px}
.cval{font-size:1.15rem;font-weight:700}
.clbl{font-size:.68rem;color:#8b949e}
.tcard{background:#161b22;border:1px solid #21262d;border-radius:10px;margin-bottom:9px;overflow:hidden}
.thdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;flex-wrap:wrap;gap:8px}
.tav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0}
.tbody2{padding:12px 14px;border-top:1px solid #21262d}
.htbl{width:100%;border-collapse:collapse;font-size:.74rem}
.htbl th{background:#0d1117;color:#8b949e;padding:6px 9px;text-align:left;font-size:.6rem;text-transform:uppercase;letter-spacing:.4px;font-weight:700;border-bottom:1px solid #21262d}
.htbl td{padding:6px 9px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.mtag{background:rgba(88,166,255,.1);color:#58a6ff;border-radius:4px;padding:2px 7px;font-weight:700;font-size:.7rem}
.pbtn{border:none;border-radius:5px;padding:3px 9px;font-size:.68rem;font-weight:700;cursor:pointer;font-family:inherit}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:#161b22;border:1px solid #30363d;border-radius:9px;padding:10px 18px;font-size:.8rem;font-weight:600;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.6);transition:.25s;opacity:0;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* BILL PREVIEW */
.bpslip{border:1px solid #30363d;border-radius:7px;overflow:hidden;margin-bottom:8px}
.bpshdr{display:flex;justify-content:space-between;padding:8px 12px;background:#0d1117}
.bpsline{display:flex;justify-content:space-between;padding:6px 12px;border-top:1px solid #21262d;font-size:.76rem}
/* RESPONSIVE */
@media(max-width:600px){
  .g2{grid-template-columns:1fr}
  .ninp{width:62px}
}
@media print{
  #topbar,#tabs,.abar,.amrow,.rbtns,.ov,.toast{display:none!important}
  #content{padding:8px;max-width:100%}
  body{background:#fff!important;color:#000!important}
  .pg{display:block!important}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>⚡ Utility<b>Bills</b></h1>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="savedTxt">✅ Saved</span>
    <input type="month" id="MP" onchange="onMonthChange(this.value)">
  </div>
</div>

<!-- TABS -->
<div id="tabs">
  <button class="tab on" id="tb-b" onclick="goTab('b')"><span>🏢</span>Billing</button>
  <button class="tab" id="tb-d" onclick="goTab('d')"><span>📊</span>Dashboard</button>
  <button class="tab" id="tb-t" onclick="goTab('t')"><span>📈</span>Trends</button>
  <button class="tab" id="tb-n" onclick="goTab('n')"><span>👤</span>Tenants</button>
</div>

<!-- CONTENT -->
<div id="content">

  <!-- BILLING -->
  <div class="pg on" id="pg-b">
    <div class="abar">
      <button class="btn b-blue" onclick="openAddBuilding()">＋ Building</button>
      <button class="btn b-ghost" onclick="openPreview()">📋 Preview Bills</button>
      <button class="btn b-green" onclick="doExcel()">📊 Excel</button>
      <button class="btn b-orange" onclick="doPDF()">📄 PDF</button>
      <button class="btn b-ghost" onclick="copyLast()" style="font-size:.72rem">⬅ Copy Last Month</button>
    </div>
    <div id="BL"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="pg" id="pg-d">
    <div class="sgrid" id="DSTATS"></div>
    <div class="g2">
      <div class="cc"><div class="ct">💰 Bill by Building</div><div class="barwrap" id="CH-B"></div></div>
      <div class="cc"><div class="ct">💧 Usage by Building</div><div class="barwrap" id="CH-U"></div></div>
    </div>
    <div class="cc"><div class="ct">🏆 Top 5 Rooms</div><div id="TOP5"></div></div>
  </div>

  <!-- TRENDS -->
  <div class="pg" id="pg-t">
    <div class="cc"><div class="ct">💰 Monthly Bill Trend</div><div class="barwrap" id="TR-B" style="height:110px"></div></div>
    <div class="cc"><div class="ct">💧 Monthly Usage Trend</div><div class="barwrap" id="TR-U" style="height:110px"></div></div>
    <div class="cc"><div class="ct">📋 All Months Summary</div><div style="overflow-x:auto"><table class="htbl" id="TR-T"></table></div></div>
  </div>

  <!-- TENANTS -->
  <div class="pg" id="pg-n">
    <div class="cbar">
      <div class="cbox" style="background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.18)">
        <div style="font-size:1.4rem">✅</div>
        <div><div class="cval" id="TC" style="color:#3fb950">₹0</div><div class="clbl">Collected</div></div>
      </div>
      <div class="cbox" style="background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.18)">
        <div style="font-size:1.4rem">⚠️</div>
        <div><div class="cval" id="TUP" style="color:#f85149">₹0</div><div class="clbl">Pending</div></div>
      </div>
    </div>
    <input type="text" id="TSEARCH" placeholder="🔍 Search room or tenant…" oninput="renderTenants()"
      style="width:100%;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 12px;color:#e6edf3;font-size:.78rem;outline:none;margin-bottom:12px">
    <div id="TL"></div>
  </div>

</div>

<!-- ADD BUILDING MODAL -->
<div class="ov" id="M-AB">
  <div class="mbox">
    <h3>🏢 Add Building</h3>
    <div class="frow">
      <label>Building Name</label>
      <input class="finp" type="text" id="AB-N" placeholder="e.g. Block A, Building 1">
    </div>
    <div class="macts">
      <button class="btn b-ghost" onclick="closeModal('M-AB')">Cancel</button>
      <button class="btn b-blue" onclick="addBuilding()">Add Building</button>
    </div>
  </div>
</div>

<!-- ADD ROOM MODAL -->
<div class="ov" id="M-AR">
  <div class="mbox">
    <h3>🏠 Add Room</h3>
    <input type="hidden" id="AR-BID">
    <div class="frow">
      <label>Room Number</label>
      <input class="finp" type="text" id="AR-N" placeholder="e.g. 101, GF-A, Room 2">
    </div>
    <div class="frow">
      <label>Tenant Name (optional)</label>
      <input class="finp" type="text" id="AR-T" placeholder="e.g. Ravi Kumar">
    </div>
    <div class="macts">
      <button class="btn b-ghost" onclick="closeModal('M-AR')">Cancel</button>
      <button class="btn b-blue" onclick="addRoom()">Add Room</button>
    </div>
  </div>
</div>

<!-- RENAME BUILDING MODAL -->
<div class="ov" id="M-RB">
  <div class="mbox">
    <h3>✏️ Rename Building</h3>
    <input type="hidden" id="RB-ID">
    <div class="frow">
      <label>Name</label>
      <input class="finp" type="text" id="RB-N">
    </div>
    <div class="macts">
      <button class="btn b-ghost" onclick="closeModal('M-RB')">Cancel</button>
      <button class="btn b-blue" onclick="saveRename()">Save</button>
    </div>
  </div>
</div>

<!-- BILL PREVIEW MODAL -->
<div class="ov" id="M-PV">
  <div class="mbox" style="max-width:500px;max-height:88vh;display:flex;flex-direction:column">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="margin:0">📄 Bills — <span id="PV-M" style="color:#58a6ff"></span></h3>
      <button class="btn b-ghost b-sm" onclick="closeModal('M-PV')">✕</button>
    </div>
    <div id="PV-C" style="overflow-y:auto;flex:1"></div>
    <div class="macts" style="margin-top:12px;padding-top:12px;border-top:1px solid #21262d">
      <button class="btn b-ghost" onclick="closeModal('M-PV')">Close</button>
      <button class="btn b-blue" onclick="window.print()">🖨️ Print</button>
    </div>
  </div>
</div>

<div class="toast" id="TOAST"></div>

<script>
// ═══════════════════════════════
//  STATE & CONSTANTS
// ═══════════════════════════════
var S = { buildings: [] };
var TD = {};
var PAL = ['#58a6ff','#3fb950','#d29922','#a78bfa','#f85149','#ffd166'];
var BC = [
  {bg:'rgba(88,166,255,.15)',tx:'#58a6ff'},
  {bg:'rgba(63,185,80,.15)',tx:'#3fb950'},
  {bg:'rgba(210,153,34,.15)',tx:'#d29922'},
  {bg:'rgba(167,139,250,.15)',tx:'#a78bfa'},
  {bg:'rgba(248,81,73,.15)',tx:'#f85149'}
];
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var autoTimer, tTimer, lastM;

function uid(){ return '_' + Math.random().toString(36).substr(2,9); }
function ge(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(m){ if(!m) return ''; var p=m.split('-'); return MONTHS[+p[1]-1]+' '+p[0]; }
function fmts(m){ if(!m) return ''; var p=m.split('-'); return MONTHS[+p[1]-1].slice(0,3)+' '+p[0].slice(2); }
function mB(m){ var d=Math.max(0,(parseFloat(m.curr)||0)-(parseFloat(m.last)||0)); return d*(parseFloat(m.rate)||0); }
function mU(m){ return Math.max(0,(parseFloat(m.curr)||0)-(parseFloat(m.last)||0)); }
function rB(r){ return r.meters.reduce(function(s,m){ return s+mB(m); },0); }
function rU(r){ return r.meters.reduce(function(s,m){ return s+mU(m); },0); }
function bB(b){ return b.rooms.reduce(function(s,r){ return s+rB(r); },0); }
function bU(b){ return b.rooms.reduce(function(s,r){ return s+rU(r); },0); }
function totB(){ return S.buildings.reduce(function(s,b){ return s+bB(b); },0); }
function totU(){ return S.buildings.reduce(function(s,b){ return s+bU(b); },0); }
function totR(){ return S.buildings.reduce(function(s,b){ return s+b.rooms.length; },0); }
function fB(id){ return S.buildings.find(function(b){ return b.id===id; }); }
function fR(bid,rid){ var b=fB(bid); return b && b.rooms.find(function(r){ return r.id===rid; }); }
function fM(bid,rid,mid){ var r=fR(bid,rid); return r && r.meters.find(function(m){ return m.id===mid; }); }
function getT(rid){ if(!TD[rid]) TD[rid]={name:'',ps:{}}; return TD[rid]; }

// ═══════════════════════════════
//  TOAST
// ═══════════════════════════════
function toast(msg){
  var t = ge('TOAST');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('on'); }, 2800);
}

// ═══════════════════════════════
//  MODAL
// ═══════════════════════════════
function openModal(id){
  ge(id).classList.add('on');
}
function closeModal(id){
  ge(id).classList.remove('on');
}
document.addEventListener('click', function(e){
  if(e.target.classList.contains('ov')) e.target.classList.remove('on');
});

function openAddBuilding(){
  ge('AB-N').value = '';
  openModal('M-AB');
  setTimeout(function(){ ge('AB-N').focus(); }, 150);
}
function openAddRoom(bid){
  ge('AR-BID').value = bid;
  ge('AR-N').value = '';
  ge('AR-T').value = '';
  openModal('M-AR');
  setTimeout(function(){ ge('AR-N').focus(); }, 150);
}
function openRename(bid){
  var b = fB(bid); if(!b) return;
  ge('RB-ID').value = bid;
  ge('RB-N').value = b.name;
  openModal('M-RB');
  setTimeout(function(){ ge('RB-N').focus(); }, 150);
}

// ═══════════════════════════════
//  NAVIGATION
// ═══════════════════════════════
function goTab(p){
  ['b','d','t','n'].forEach(function(x){
    var pg = ge('pg-'+x), tb = ge('tb-'+x);
    if(pg) pg.classList.toggle('on', x===p);
    if(tb) tb.classList.toggle('on', x===p);
  });
  if(p==='d') renderDash();
  if(p==='t') renderTrends();
  if(p==='n') renderTenants();
}

// ═══════════════════════════════
//  MONTH
// ═══════════════════════════════
function curM(){ return ge('MP').value; }

function onMonthChange(v){
  if(lastM) saveM(lastM);
  lastM = v;
  localStorage.setItem('ubm_month', v);  // SAVE selected month
  loadM(v);
  toast('📅 ' + fmt(v));
}

// ═══════════════════════════════
//  SAVE / LOAD
// ═══════════════════════════════
function autoSave(){
  // Save immediately — no delay
  saveM(curM());
  var t = ge('savedTxt');
  t.classList.add('on');
  setTimeout(function(){ t.classList.remove('on'); }, 1500);
}

function saveM(m){
  if(!m) return;
  // Save FULL state (structure + readings together) - most reliable
  localStorage.setItem('ubm_full', JSON.stringify(S));
  localStorage.setItem('ubm_month', m);
  // Also save structure separately for new months
  var struct = { buildings: S.buildings.map(function(b){
    return { id:b.id, name:b.name, rooms: b.rooms.map(function(r){
      return { id:r.id, name:r.name, meters: r.meters.map(function(mt){
        return { id:mt.id, name:mt.name, unit:mt.unit, rate:mt.rate };
      })};
    })};
  })};
  localStorage.setItem('ubm_struct', JSON.stringify(struct));
  // Save readings for this month
  var readings = {};
  S.buildings.forEach(function(b){ b.rooms.forEach(function(r){ r.meters.forEach(function(mt){
    if(!readings[r.id]) readings[r.id]={};
    readings[r.id][mt.id]={last:mt.last||'',curr:mt.curr||''};
  });});});
  localStorage.setItem('ubm_r_'+m, JSON.stringify(readings));
}

function loadM(m){
  // Load structure first
  var stSv = localStorage.getItem('ubm_struct');
  if(stSv){ try{ S = JSON.parse(stSv); }catch(e){} }
  // Then apply readings for this month
  var rdSv = localStorage.getItem('ubm_r_'+m);
  var readings = rdSv ? JSON.parse(rdSv) : {};
  S.buildings.forEach(function(b){ b.rooms.forEach(function(r){ r.meters.forEach(function(mt){
    var rd = readings[r.id] && readings[r.id][mt.id];
    mt.last = rd ? rd.last : '';
    mt.curr = rd ? rd.curr : '';
  });});});
  render();
  var cur = document.querySelector('.pg.on');
  if(cur){
    var id = cur.id.replace('pg-','');
    if(id==='d') renderDash();
    if(id==='t') renderTrends();
    if(id==='n') renderTenants();
  }
}

function saveTD(){
  localStorage.setItem('ubt', JSON.stringify(TD));
}

function allMs(){
  var ms = [];
  for(var i=0;i<localStorage.length;i++){
    var k = localStorage.key(i);
    if(k && k.startsWith('ubm_r_')) ms.push(k.replace('ubm_r_',''));
  }
  return ms.sort();
}
function getMS(m){
  // Rebuild full state for a month from structure + readings
  var stSv = localStorage.getItem('ubm_struct');
  if(!stSv) return null;
  var st; try{ st=JSON.parse(stSv); }catch(e){ return null; }
  var rdSv = localStorage.getItem('ubm_r_'+m);
  var readings = rdSv ? JSON.parse(rdSv) : {};
  st.buildings.forEach(function(b){ b.rooms.forEach(function(r){ r.meters.forEach(function(mt){
    var rd = readings[r.id] && readings[r.id][mt.id];
    mt.last = rd ? rd.last : '';
    mt.curr = rd ? rd.curr : '';
  });});});
  return st;
}

function copyLast(){
  var m = curM(); if(!m){ toast('⚠️ Select a month'); return; }
  var p = m.split('-').map(Number);
  var pm = p[1]===1?12:p[1]-1, py = p[1]===1?p[0]-1:p[0];
  var pk = 'ubm_'+py+'-'+String(pm).padStart(2,'0');
  var sv = localStorage.getItem(pk);
  if(!sv){ toast('⚠️ No data for previous month'); return; }
  try{
    var ps = JSON.parse(sv);
    ps.buildings.forEach(function(b){ b.rooms.forEach(function(r){ r.meters.forEach(function(mt){ mt.last=mt.curr; mt.curr=''; }); }); });
    S = ps; render(); autoSave(); toast('⬅ Last month readings loaded!');
  } catch(e){ toast('⚠️ Error loading previous month'); }
}

function updR(bid, rid, mid, field, val){
  var m = fM(bid,rid,mid); if(!m) return;
  m[field] = val;
  var lv = parseFloat(m.last)||0, cv = parseFloat(m.curr)||0, diff = cv - lv;
  var bill = diff>0 ? (diff*(parseFloat(m.rate)||0)).toFixed(2) : null;
  var dc = ge('DC-'+mid), bc = ge('BC-'+mid);
  if(dc && bc){
    if(diff<0){
      dc.innerHTML='<span class="ev">'+diff+' ⚠</span>';
      bc.innerHTML='<span class="ev">Err</span>';
    } else {
      dc.innerHTML='<span class="dv">'+diff+' '+esc(m.unit)+'</span>';
      bc.innerHTML=bill?'<span class="bv">₹'+bill+'</span>':'<span class="zv">—</span>';
    }
  }
  var r=fR(bid,rid); var rb=rB(r);
  var rt=ge('RT-'+rid); if(rt) rt.textContent=rb>0?'₹'+rb.toFixed(2):'—';
  var b=fB(bid); var bb=bBill(b);
  var bcEl=ge('BC-'+bid); if(bcEl){ var btEl=bcEl.querySelector('.btotal'); if(btEl) btEl.textContent=bb>0?'₹'+bb.toFixed(2):'—'; }
  var rc=ge('RC-'+rid); if(rc){ var trs=rc.querySelectorAll('.trow'); if(trs.length){ trs[0].cells[3].textContent=rU(r)+' units'; trs[0].cells[5].textContent='₹'+rb.toFixed(2); } }
  autoSave();
}

function bBill(b){ return b.rooms.reduce(function(s,r){ return s+rB(r); },0); }

function addBuilding(){
  var n = ge('AB-N').value.trim();
  if(!n){ alert('Please enter a building name'); return; }
  S.buildings.push({ id:uid(), name:n, rooms:[] });
  ge('AB-N').value = '';
  closeModal('M-AB');
  render(); autoSave(); toast('🏢 "'+n+'" added!');
}

function addRoom(){
  var bid = ge('AR-BID').value;
  var n = ge('AR-N').value.trim();
  var tn = ge('AR-T').value.trim();
  if(!n){ alert('Please enter a room number'); return; }
  var b = fB(bid); if(!b) return;
  var rid = uid();
  b.rooms.push({ id:rid, name:n, meters:[] });
  if(tn){ getT(rid).name = tn; saveTD(); }
  ge('AR-N').value = ''; ge('AR-T').value = '';

}

function addMeter(bid, rid){
  var n = ge('MN-'+rid).value.trim();
  var u = ge('MU-'+rid).value.trim();
  var r2 = parseFloat(ge('MR-'+rid).value) || 0;
  if(!n){ alert('Enter meter name e.g. Water'); return; }
  var rm = fR(bid,rid); if(!rm) return;
  rm.meters.push({ id:uid(), name:n, unit:u||'units', rate:r2, last:'', curr:'' });
  render(); autoSave(); toast('✅ '+n+' meter added!');
}

function delMeter(bid,rid,mid){
  var r = fR(bid,rid); if(!r) return;
  r.meters = r.meters.filter(function(m){ return m.id!==mid; });
  render(); autoSave();
}
function delRoom(bid,rid){
  if(!confirm('Delete this room?')) return;
  var b = fB(bid);
  b.rooms = b.rooms.filter(function(r){ return r.id!==rid; });
  render(); autoSave();
}
function delBldg(bid){
  if(!confirm('Delete building and all rooms?')) return;
  S.buildings = S.buildings.filter(function(b){ return b.id!==bid; });
  render(); autoSave();
}
function saveRename(){
  var n = ge('RB-N').value.trim(); if(!n) return;
  var b = fB(ge('RB-ID').value); if(b) b.name = n;
  closeModal('M-RB'); render(); autoSave();
}
function toggleBldg(bid){ var el=ge('BC-'+bid); if(el) el.classList.toggle('closed'); }
function setTN(rid, n){

function togPay(rid, m){

function allHA(){
  var map={};
  S.buildings.forEach(function(b){ b.rooms.forEach(function(r){ map[b.id+'_'+r.id]={bid:b.id,bn:b.name,rid:r.id,rn:r.name}; }); });
  allMs().forEach(function(m){ var sv=getMS(m); if(!sv) return; sv.buildings.forEach(function(b){ b.rooms.forEach(function(r){ var k=b.id+'_'+r.id; if(!map[k]) map[k]={bid:b.id,bn:b.name,rid:r.id,rn:r.name}; }); }); });
  return Object.values(map);
}
function getRBM(rid,m){ var sv=getMS(m); if(!sv) return null; for(var i=0;i<sv.buildings.length;i++){ var b=sv.buildings[i]; for(var j=0;j<b.rooms.length;j++){ var r=b.rooms[j]; if(r.id===rid){ var bill=r.meters.reduce(function(s,mt){var d=Math.max(0,(parseFloat(mt.curr)||0)-(parseFloat(mt.last)||0));return s+d*(parseFloat(mt.rate)||0);},0),usage=r.meters.reduce(function(s,mt){return s+Math.max(0,(parseFloat(mt.curr)||0)-(parseFloat(mt.last)||0));},0); return{bill:bill,usage:usage}; }}} return null; }

function renderTenants(){

      html+='<table><thead><tr><th>Room</th><th>Tenant</th><th>Meter</th><th>Last</th><th>Curr</th><th>Used</th><th>Rate</th><th class="ra">Bill</th><th>Status</th></tr></thead><tbody>';
      b.rooms.forEach(function(r){ var ti=TD[r.id]||{},ps=(ti.ps&&ti.ps[m])||'unpaid';
        if(!r.meters.length){ html+='<tr><td>'+r.name+'</td><td>'+(ti.name||'—')+'</td><td colspan="5" style="color:#aaa">No meters</td><td>₹0.00</td><td><span class="'+ps+'">'+(ps==='paid'?'✓ PAID':'✗ UNPAID')+'</span></td></tr>'; }
        else{ r.meters.forEach(function(mt,mi){ var pr=parseFloat(mt.last)||0,cu=parseFloat(mt.curr)||0,df=Math.max(0,cu-pr),bl=df*(parseFloat(mt.rate)||0);
          html+='<tr>'+(mi===0?'<td rowspan="'+r.meters.length+'">'+r.name+'</td><td rowspan="'+r.meters.length+'">'+(ti.name||'—')+'</td>':'')+'<td>'+mt.name+'</td><td>'+pr+'</td><td>'+cu+'</td><td>'+df+' '+mt.unit+'</td><td>₹'+mt.rate+'</td><td class="ra">₹'+bl.toFixed(2)+'</td>'+(mi===0?'<td rowspan="'+r.meters.length+'" style="text-align:center;vertical-align:middle"><span class="'+ps+'">'+(ps==='paid'?'✓ PAID':'✗ UNPAID')+'</span></td>':'')+'</tr>'; }); }
      });
      html+='</tbody></table>';
    });
    html+='<div class="ft2">UtilityBills · '+fmt(m)+'</div></div>';
  });
  html+='</body></html>';
  var w=window.open('','_blank');
  if(!w){ toast('⚠️ Please allow popups'); return; }
  w.document.write(html); w.document.close(); w.focus();
  setTimeout(function(){ w.print(); }, 700);
  toast('📄 All months PDF ready — Save as PDF');
}

// ═══════════════════════════════
//  INIT — runs immediately
// ═══════════════════════════════
(function(){
  // Load tenant data
  var td = localStorage.getItem('ubt');
  if(td){ try{ TD = JSON.parse(td); } catch(e){} }

  // Restore saved month (or use current month)
  var now2 = new Date();
  var defaultM = now2.getFullYear() + '-' + String(now2.getMonth()+1).padStart(2,'0');
  var cm = localStorage.getItem('ubm_month') || defaultM;
  ge('MP').value = cm;
  lastM = cm;

  // Load full saved state first
  var fullSv = localStorage.getItem('ubm_full');
  if(fullSv){ try{ S = JSON.parse(fullSv); }catch(e){} }
  else {
    // Fallback to struct + readings
    var stSv = localStorage.getItem('ubm_struct');
    if(stSv){ try{ S = JSON.parse(stSv); }catch(e){} }
  }
  // Apply readings for the selected month
  var rdSv = localStorage.getItem('ubm_r_'+cm);
  if(rdSv){
    try{
      var readings = JSON.parse(rdSv);
      S.buildings.forEach(function(b){ b.rooms.forEach(function(r){ r.meters.forEach(function(mt){
        var rd = readings[r.id] && readings[r.id][mt.id];
        mt.last = rd ? rd.last : '';
        mt.curr = rd ? rd.curr : '';
      });});});
    }catch(e){}
  }
  render();

  // ── EMERGENCY SAVE GUARDS ──────────────────────
  // Save when user refreshes, closes, or switches app
  function emergencySave(){
    var m = ge('MP').value;
    if(!m) return;
    localStorage.setItem('ubm_month', m);
    localStorage.setItem('ubm_full', JSON.stringify(S));
    localStorage.setItem('ubt', JSON.stringify(TD));
    localStorage.setItem('ubm_ts', Date.now().toString());
    // Save readings
    var readings={};
    S.buildings.forEach(function(b){b.rooms.forEach(function(r){r.meters.forEach(function(mt){
      if(!readings[r.id])readings[r.id]={};
      readings[r.id][mt.id]={last:mt.last||'',curr:mt.curr||''};
    });});});
    localStorage.setItem('ubm_r_'+m, JSON.stringify(readings));
  }
  window.addEventListener('beforeunload', emergencySave);
  window.addEventListener('pagehide', emergencySave);
  document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='hidden') emergencySave(); });
  // Auto-save every 5 seconds
  setInterval(emergencySave, 5000);

  // ── FIREBASE SYNC ──────────────────────────────
  // Load Firebase after page renders - never blocks UI
  setTimeout(function(){
    function loadJS(src,cb){ var s=document.createElement('script');s.src=src;s.async=true;s.onload=cb;s.onerror=function(){console.log('No internet - offline mode');};document.head.appendChild(s); }
    loadJS('https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js',function(){
      loadJS('https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js',function(){
        try{
          if(firebase.apps.length===0){
            firebase.initializeApp({
              apiKey:"AIzaSyCm3Pi7ipBCMykrB3mxcUYoCWxFnlSZgSU",
              authDomain:"monumental-semolina-215edd.firebaseapp.com",
              databaseURL:"https://monumental-semolina-215edd-default-rtdb.firebaseio.com",
              projectId:"monumental-semolina-215edd",
              storageBucket:"monumental-semolina-215edd.appspot.com",
              messagingSenderId:"447104436677",
              appId:"1:447104436677:web:f63510d825512a9496a3ac"
            });
          }
          var db = firebase.database();
          var isSyncing = false;

          // PUSH local data to Firebase (called after every save)
          window.pushCloud = function(){
            if(!db||isSyncing) return;
            var payload = {
              struct: localStorage.getItem('ubm_struct'),
              full:   localStorage.getItem('ubm_full'),
              td:     localStorage.getItem('ubt'),
              month:  localStorage.getItem('ubm_month'),
              ts:     Date.now()
            };
            // save all monthly readings
            var keys=[];
            for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('ubm_r_'))keys.push(k);}
            keys.forEach(function(k){ payload[k.replace('ubm_r_','r_')]=localStorage.getItem(k); });
            db.ref('ub2/data').set(payload).catch(function(){});
          };

          // LISTEN for changes from other device
          db.ref('ub2/data').on('value', function(snap){
            var v = snap.val();
            if(!v || !v.ts) return;
            // Only pull if other device is newer
            var localTs = parseInt(localStorage.getItem('ubm_ts')||'0');
            if(v.ts <= localTs) return;  // our data is newer, ignore
            
            isSyncing = true;
            // Restore all data from cloud
            if(v.struct) localStorage.setItem('ubm_struct', v.struct);
            if(v.full)   localStorage.setItem('ubm_full',   v.full);
            if(v.td)     localStorage.setItem('ubt',        v.td);
            if(v.month)  localStorage.setItem('ubm_month',  v.month);
            // Restore monthly readings
            Object.keys(v).forEach(function(k){
              if(k.startsWith('r_')) localStorage.setItem('ubm_'+k, v[k]);
            });
            localStorage.setItem('ubm_ts', v.ts);
            
            // Apply to current state
            var fullSv = localStorage.getItem('ubm_full');
            if(fullSv){ try{ S=JSON.parse(fullSv); }catch(e){} }
            // Apply current month readings
            var curMonth = ge('MP').value;
            var rdSv = localStorage.getItem('ubm_r_'+curMonth);
            if(rdSv){ try{
              var rd=JSON.parse(rdSv);
              S.buildings.forEach(function(b){b.rooms.forEach(function(r){r.meters.forEach(function(mt){
                var x=rd[r.id]&&rd[r.id][mt.id];mt.last=x?x.last:'';mt.curr=x?x.curr:'';
              });});});
            }catch(e){} }
            // Restore tenant data
            var tdSv = localStorage.getItem('ubt');
            if(tdSv){ try{ TD=JSON.parse(tdSv); }catch(e){} }
            render(); renderTenants();
            isSyncing = false;
            toast('🔄 Synced from other device!');
          });

          toast('☁️ Online - live sync active');
        }catch(e){ console.log('Firebase error:', e); }
      });
    });
  }, 2000);

})();
</script>
